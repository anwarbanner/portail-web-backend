spring.application.name=portail-web-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/portail_web_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema; Hibernate should only validate it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT configuration (override with environment variables in production)
jwt.secret=${JWT_SECRET:change_this_to_a_long_random_secret}
# 15 minutes
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
# 14 days
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# CORS (React frontend)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Seed admin user for initial access; override in production.
app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:false}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@12345}

# Storage for norme PDF files
app.storage.norme-pdf-dir=${APP_STORAGE_NORME_PDF_DIR:storage/normes}
